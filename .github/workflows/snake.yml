name: Generate Snake

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Snake erzeugen
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?color_snake=%23a9744f&color_dots=%23ece3d6,%23d8b48a,%23a9744f,%237e552f,%235b3a1e
            dist/snake-dark.svg?color_snake=%23b8895a&color_dots=%232b2521,%236b4a2f,%23a9744f,%23c99b6e,%23e7c79b

      - name: Auf output-Branch veröffentlichen
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
