<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 210" width="760"
     font-family="'JetBrains Mono', 'SFMono-Regular', Consolas, monospace">
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b8895a"/>
      <stop offset="0.5" stop-color="#e7c79b"/>
      <stop offset="1" stop-color="#b8895a"/>
      <animate attributeName="x1" values="-1;1" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;2"  dur="3.5s" repeatCount="indefinite"/>
    </linearGradient>

    <clipPath id="type">
      <rect x="40" y="86" height="44" width="0">
        <animate attributeName="width" from="0" to="470" dur="2.2s" begin="0.4s"
                 fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Fenster -->
  <rect x="2" y="2" width="756" height="206" rx="16" fill="#1c1917" stroke="#3a342f"/>

  <!-- Titelleiste -->
  <circle cx="30" cy="30" r="6" fill="#e0654f"/>
  <circle cx="50" cy="30" r="6" fill="#e0a93f"/>
  <circle cx="70" cy="30" r="6" fill="#5fae6a"/>
  <text x="94" y="35" fill="#a39689" font-size="14">elias.cs</text>

  <!-- Kommentar -->
  <text x="40" y="72" fill="#8c7a6a" font-size="15">// willkommen in meinem Profil</text>

  <!-- Name (Typing) -->
  <g clip-path="url(#type)">
    <text x="40" y="118" fill="#e7e0d6" font-size="33" font-weight="700">Elias-Constantin Regber</text>
  </g>

  <!-- Cursor -->
  <rect y="92" width="3" height="32" fill="#b8895a">
    <animate attributeName="x" from="40" to="512" dur="2.2s" begin="0.4s"
             fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/>
    <animate attributeName="opacity" values="1;1;0;0" dur="0.9s" begin="2.7s" repeatCount="indefinite"/>
  </rect>

  <!-- Untertitel -->
  <text x="40" y="152" fill="#a39689" font-size="16" opacity="0">
    Full-Stack Developer · Teamleiter · Ausbilder @ on-geo GmbH
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="2.5s" fill="freeze"/>
  </text>

  <!-- animierter Akzentbalken -->
  <rect x="40" y="176" width="680" height="4" rx="2" fill="url(#bar)"/>
</svg>
